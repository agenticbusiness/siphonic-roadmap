<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siphonic Spatial Flow Builder</title>
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Three.js + Extensions -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    
    <!-- Supabase for CRM Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #020617; 
            font-family: 'Inter', sans-serif; 
            user-select: none;
        }
        
        #webgl-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #css-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        
        /* Deep Atmospheric Background */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 35%),
                        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 35%),
                        radial-gradient(circle at 50% 90%, rgba(52, 211, 153, 0.1), transparent 30%);
            filter: blur(60px);
        }
        
        /* High-Fidelity Glassmorphism Nodes */
        .flow-node {
            width: 280px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.1);
            color: white;
            position: relative;
            cursor: grab;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .flow-node:active { 
            cursor: grabbing; 
            border-color: rgba(56, 189, 248, 0.8); 
            box-shadow: 0 15px 50px -10px rgba(0,0,0,0.9), 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .flow-node.note {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.4);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.05);
        }
        .flow-node.crm {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.05);
        }
        
        /* Connection Ports */
        .port {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: crosshair;
            border: 3px solid #0f172a;
            z-index: 10;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .port:hover { 
            transform: translateY(-50%) scale(1.4); 
        }
        .port.input-port { 
            left: -8px; 
            background: #a855f7; 
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.6);
        }
        .port.output-port { 
            right: -8px; 
            background: #38bdf8; 
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }
        
        /* Overlay UI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-auto { pointer-events: auto; }
        
        /* Custom Scrollbar for Textareas */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="ambient-bg"></div>
    <div class="fixed inset-0 z-0 opacity-[0.02]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.65\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E');"></div>
    
    <!-- Render Layers -->
    <div id="webgl-container"></div>
    <div id="css-container"></div>
    
    <!-- Static UI Overlay -->
    <div id="ui-layer" class="flex flex-col justify-between p-6">
        <div class="flex justify-between items-start">
            
            <!-- Left: Brand & Spawn Controls -->
            <div class="flex items-center gap-6 pointer-auto">
                <div class="bg-slate-900/80 backdrop-blur-md border border-slate-700 p-4 rounded-2xl flex items-center gap-4 shadow-xl">
                    <div class="p-2 bg-sky-500/10 rounded-lg border border-sky-500/20">
                        <i data-lucide="network" class="text-sky-400 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-white font-black tracking-widest uppercase leading-none glow-text text-lg">Spatial OS</h1>
                        <span class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] mt-1 block">Architecture Graph</span>
                    </div>
                </div>
                
                <div class="flex gap-3">
                    <button onclick="addNode('component')" class="bg-slate-900/80 backdrop-blur hover:bg-slate-800 text-sky-400 border border-slate-700 hover:border-sky-500/50 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-2 transition-all shadow-lg group">
                        <i data-lucide="plus-square" class="w-4 h-4 group-hover:scale-110 transition-transform"></i> Add Component
                    </button>
                    <button onclick="addNode('note')" class="bg-slate-900/80 backdrop-blur hover:bg-slate-800 text-amber-400 border border-slate-700 hover:border-amber-500/50 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-2 transition-all shadow-lg group">
                        <i data-lucide="sticky-note" class="w-4 h-4 group-hover:scale-110 transition-transform"></i> Add Note
                    </button>
                    <button onclick="addNode('crm')" class="bg-emerald-900/40 backdrop-blur hover:bg-emerald-800/60 text-emerald-400 border border-emerald-700/50 hover:border-emerald-500 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider flex items-center gap-2 transition-all shadow-lg group">
                        <i data-lucide="users" class="w-4 h-4 group-hover:scale-110 transition-transform"></i> Tag CRM Entity
                    </button>
                </div>
            </div>
            
            <!-- Right: 3D View Toggle Button -->
            <div class="pointer-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-sky-500 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                <button onclick="toggleView()" id="view-toggle-btn" class="relative bg-slate-900/90 backdrop-blur-md border border-slate-700 p-4 rounded-2xl flex items-center gap-4 transition-all shadow-2xl hover:border-indigo-500/50">
                    <div class="p-2 bg-indigo-500/10 rounded-lg border border-indigo-500/30" id="view-icon-wrapper">
                        <i data-lucide="box" id="view-icon" class="w-6 h-6 text-indigo-400 transition-transform duration-500"></i>
                    </div>
                    <div class="text-left w-36">
                        <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none mb-1.5">Camera Mode</div>
                        <div id="view-label" class="text-sm font-black text-white uppercase tracking-wider leading-none">2D Top Profile</div>
                    </div>
                </button>
            </div>

        </div>
        
        <!-- Bottom: Tooltip/Help -->
        <div class="pointer-auto self-end bg-slate-900/80 backdrop-blur border border-slate-800 px-4 py-2 rounded-lg text-[10px] font-medium text-slate-400 tracking-wider flex gap-4">
            <span><strong class="text-slate-200">Drag Port:</strong> Connect Nodes</span>
            <span class="w-px bg-slate-700"></span>
            <span><strong class="text-slate-200">Right-Click:</strong> Pan Canvas</span>
            <span class="w-px bg-slate-700"></span>
            <span><strong class="text-slate-200">Scroll:</strong> Zoom</span>
        </div>
    </div>

    <!-- Hidden Node Template -->
    <template id="node-template">
        <div class="flow-node p-5 group">
            <div class="port input-port" title="Input (Click to connect)"></div>
            <div class="port output-port" title="Output (Drag to input)"></div>
            
            <input type="text" class="w-full bg-transparent border-b border-transparent hover:border-slate-700 focus:border-sky-500 outline-none font-bold text-lg mb-3 transition-colors placeholder-slate-600 pb-1" placeholder="Node Title">
            <textarea class="w-full bg-transparent border border-transparent hover:border-slate-700 focus:border-sky-500 outline-none text-xs text-slate-300 resize-none h-20 transition-colors placeholder-slate-600 rounded p-2 leading-relaxed" placeholder="Detailed description, logic, or notes..."></textarea>
            
            <div class="mt-4 pt-3 border-t border-slate-700/50 flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Vertical Level (Z-Axis)</span>
                    <span class="z-value-display text-xs font-black text-sky-400">0</span>
                </div>
                <input type="range" min="-1000" max="1000" value="0" class="w-full accent-sky-500 z-slider cursor-pointer">
            </div>
            
            <div class="crm-actions hidden mt-3 flex gap-2">
                <button class="fetch-crm-btn bg-slate-800 hover:bg-emerald-600 text-emerald-400 hover:text-white px-3 py-1.5 rounded border border-emerald-500/30 text-[10px] uppercase tracking-wider font-bold transition-colors flex-1 flex justify-center items-center gap-1">
                    <i data-lucide="search" class="w-3 h-3"></i> Sync CRM
                </button>
                <a href="#" target="_blank" class="open-crm-btn bg-slate-800 hover:bg-sky-600 text-sky-400 hover:text-white px-3 py-1.5 rounded border border-sky-500/30 text-[10px] uppercase tracking-wider font-bold transition-colors flex justify-center items-center gap-1 hidden">
                    <i data-lucide="external-link" class="w-3 h-3"></i> View
                </a>
            </div>
        </div>
    </template>

    <script>
        lucide.createIcons();

        // ==========================================
        // 1. ENGINE INITIALIZATION (Three.js)
        // ==========================================
        const webglContainer = document.getElementById('webgl-container');
        const cssContainer = document.getElementById('css-container');

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.0002); // Deep space fade effect

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 15000);
        
        // WebGL for rendering connection lines (Bezier curves)
        const webglRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        webglRenderer.setSize(window.innerWidth, window.innerHeight);
        webglContainer.appendChild(webglRenderer.domElement);

        // CSS3D for rendering actual DOM HTML nodes in 3D space
        const cssRenderer = new THREE.CSS3DRenderer();
        cssRenderer.setSize(window.innerWidth, window.innerHeight);
        cssContainer.appendChild(cssRenderer.domElement);

        // OrbitControls for panning, zooming, and 3D rotation
        const controls = new THREE.OrbitControls(camera, cssRenderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // ==========================================
        // 2. VIEW STATE MACHINE
        // ==========================================
        // 0 = 2D Top (XY Plane)
        // 1 = 2D Side Profile (XZ Plane)
        // 2 = 3D Tilted (Full rotation)
        let viewState = 0;
        let targetCameraPos = new THREE.Vector3(0, 0, 1800);
        let targetCameraLook = new THREE.Vector3(0, 0, 0);

        // Initialize default view
        camera.position.copy(targetCameraPos);
        camera.lookAt(targetCameraLook);
        
        // Restrict controls initially to 2D Panning only
        controls.enableRotate = false;
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN,
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.PAN
        };

        const viewConfig = [
            { label: "2D Top Profile", icon: "layout-template", color: "text-indigo-400", pos: new THREE.Vector3(0, 0, 1800), rotate: false },
            { label: "2D Side Profile", icon: "align-vertical-space-around", color: "text-emerald-400", pos: new THREE.Vector3(0, -1800, 0), rotate: false },
            { label: "3D Spatial View", icon: "box", color: "text-fuchsia-400", pos: new THREE.Vector3(1200, -1200, 1200), rotate: true }
        ];

        function toggleView() {
            viewState = (viewState + 1) % 3;
            const config = viewConfig[viewState];
            
            // Update UI
            document.getElementById('view-label').innerText = config.label;
            document.getElementById('view-icon-wrapper').innerHTML = `<i data-lucide="${config.icon}" class="w-6 h-6 ${config.color}"></i>`;
            lucide.createIcons();

            // Animate Icon Wrapper
            const wrapper = document.getElementById('view-icon-wrapper');
            wrapper.style.transform = 'scale(0.8)';
            setTimeout(() => wrapper.style.transform = 'scale(1)', 150);

            // Set Target Camera Math
            targetCameraPos.copy(config.pos);
            controls.enableRotate = config.rotate;
            
            if (config.rotate) {
                controls.mouseButtons.LEFT = THREE.MOUSE.ROTATE; // Enable 3D drag-to-rotate
            } else {
                controls.mouseButtons.LEFT = THREE.MOUSE.PAN; // Lock back to 2D panning
            }
        }

        // ==========================================
        // 3. GRAPH DATA & INTERACTION LOGIC
        // ==========================================
        const nodes = [];
        const connections = [];

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Mathematical plane for raycasting mouse coordinates to drag nodes in 2D space
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        
        let draggedNode = null;
        let connectingNode = null; // The node currently stretching a line
        let tempLineMesh = null;   // The temporary line being drawn to the mouse

        const LINE_MATERIAL = new THREE.LineBasicMaterial({ 
            color: 0x38bdf8, 
            linewidth: 2, 
            transparent: true, 
            opacity: 0.7 
        });
        
        const TEMP_LINE_MATERIAL = new THREE.LineBasicMaterial({ 
            color: 0xa855f7, 
            opacity: 0.8, 
            transparent: true, 
            dashed: true 
        });

        // 3D Cubic Bezier Math for sexy connection lines
        function buildBezierGeometry(p1, p2) {
            const dist = p1.distanceTo(p2);
            const ctrlOffset = Math.max(150, dist * 0.4); // Extrude control points horizontally
            const curve = new THREE.CubicBezierCurve3(
                p1,
                p1.clone().add(new THREE.Vector3(ctrlOffset, 0, 0)),
                p2.clone().add(new THREE.Vector3(-ctrlOffset, 0, 0)),
                p2
            );
            return new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
        }

        function createTempLine() {
            const geometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            tempLineMesh = new THREE.Line(geometry, TEMP_LINE_MATERIAL);
            scene.add(tempLineMesh);
        }

        function updateTempLine(endPoint) {
            if(!tempLineMesh || !connectingNode) return;
            const p1 = new THREE.Vector3(connectingNode.position.x + 140, connectingNode.position.y, connectingNode.position.z);
            tempLineMesh.geometry.dispose();
            tempLineMesh.geometry = buildBezierGeometry(p1, endPoint);
        }

        function createConnection(sourceNode, targetNode) {
            // Prevent duplicate connections
            const exists = connections.find(c => c.source === sourceNode && c.target === targetNode);
            if (exists) return;

            const p1 = new THREE.Vector3(sourceNode.position.x + 140, sourceNode.position.y, sourceNode.position.z);
            const p2 = new THREE.Vector3(targetNode.position.x - 140, targetNode.position.y, targetNode.position.z);
            
            const line = new THREE.Line(buildBezierGeometry(p1, p2), LINE_MATERIAL);
            scene.add(line);
            
            connections.push({ source: sourceNode, target: targetNode, line: line });
        }

        function updateConnections() {
            connections.forEach(conn => {
                const p1 = new THREE.Vector3(conn.source.position.x + 140, conn.source.position.y, conn.source.position.z);
                const p2 = new THREE.Vector3(conn.target.position.x - 140, conn.target.position.y, conn.target.position.z);
                conn.line.geometry.dispose();
                conn.line.geometry = buildBezierGeometry(p1, p2);
            });
        }

        // ==========================================
        // 4. NODE CREATION & LIFECYCLE
        // ==========================================
        function addNode(type = 'component') {
            const template = document.getElementById('node-template');
            const clone = template.content.cloneNode(true);
            const el = clone.querySelector('.flow-node');
            const titleInput = el.querySelector('input');
            const descArea = el.querySelector('textarea');
            
            if (type === 'note') {
                el.classList.add('note');
                titleInput.value = "Observation Note";
            } else if (type === 'crm') {
                el.classList.add('crm');
                titleInput.value = "";
                titleInput.placeholder = "Enter Company Name (Exact Match)";
                descArea.placeholder = "CRM data will auto-populate here...";
                descArea.readOnly = true;
                
                const crmActions = el.querySelector('.crm-actions');
                crmActions.classList.remove('hidden');
                
                const fetchBtn = el.querySelector('.fetch-crm-btn');
                const openBtn = el.querySelector('.open-crm-btn');
                
                fetchBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const q = titleInput.value.trim();
                    if(!q) return;
                    
                    fetchBtn.innerHTML = `<i data-lucide="loader" class="w-3 h-3 animate-spin"></i> Syncing...`;
                    lucide.createIcons();
                    
                    try {
                        const { data, error } = await window.supabaseClient
                            .from('siphonic_companies')
                            .select('*')
                            .ilike('name', `%${q}%`)
                            .limit(1);
                            
                        if (error) throw error;
                        
                        if (data && data.length > 0) {
                            const comp = data[0];
                            titleInput.value = comp.name;
                            descArea.value = `ID: ${comp.id}\nType: ${comp.type_id}\nPhone: ${comp.phone || 'N/A'}\nWebsite: ${comp.website || 'N/A'}\nNotes: ${comp.notes || 'None'}`;
                            
                            openBtn.classList.remove('hidden');
                            openBtn.href = `https://agenticbusiness.github.io/Siphonic-Master-CRM/?view=companies&id=${comp.id}`;
                            fetchBtn.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> Synced`;
                        } else {
                            descArea.value = "Error: CRM Entity not found in database.";
                            fetchBtn.innerHTML = `<i data-lucide="search" class="w-3 h-3"></i> Sync CRM`;
                        }
                    } catch(err) {
                        descArea.value = "Connection Error to VPS Brain.";
                        fetchBtn.innerHTML = `<i data-lucide="search" class="w-3 h-3"></i> Sync CRM`;
                    }
                    lucide.createIcons();
                });
            }

            // Convert DOM to 3D Space Object
            const object = new THREE.CSS3DObject(el);
            // Spawn near center
            object.position.x = (Math.random() - 0.5) * 500;
            object.position.y = (Math.random() - 0.5) * 500;
            object.position.z = 0;
            
            scene.add(object);
            nodes.push(object);

            // Bind Port Logic (Wiring)
            const outPort = el.querySelector('.output-port');
            const inPort = el.querySelector('.input-port');
            
            outPort.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                connectingNode = object;
                if(!tempLineMesh) createTempLine();
            });

            inPort.addEventListener('mouseup', (e) => {
                e.stopPropagation();
                if (connectingNode && connectingNode !== object) {
                    createConnection(connectingNode, object);
                }
                connectingNode = null;
                if(tempLineMesh) {
                    scene.remove(tempLineMesh);
                    tempLineMesh = null;
                }
            });

            // Bind Drag Logic
            el.addEventListener('mousedown', (e) => {
                // Ignore drags if interacting with inputs/ports
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.classList.contains('port')) return;
                
                e.stopPropagation();
                controls.enabled = false; // Disable camera panning while dragging node
                draggedNode = object;
                
                // Align mathematical drag plane to the node's current Z depth
                dragPlane.constant = -object.position.z;
            });

            // Bind Z-Level (Depth) Slider
            const zSlider = el.querySelector('.z-slider');
            const zDisplay = el.querySelector('.z-value-display');
            
            zSlider.addEventListener('input', (e) => {
                const zVal = parseInt(e.target.value);
                object.position.z = zVal;
                zDisplay.innerText = zVal;
                updateConnections();
            });
            
            // Prevent dragging node when sliding Z-axis
            zSlider.addEventListener('mousedown', e => e.stopPropagation());
        }

        // ==========================================
        // 5. GLOBAL EVENT LISTENERS
        // ==========================================
        window.addEventListener('mousemove', (e) => {
            // Convert to normalized device coordinates
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (draggedNode) {
                raycaster.setFromCamera(mouse, camera);
                const targetPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, targetPoint);
                if (targetPoint) {
                    draggedNode.position.x = targetPoint.x;
                    draggedNode.position.y = targetPoint.y;
                    updateConnections();
                }
            }

            if (connectingNode && tempLineMesh) {
                raycaster.setFromCamera(mouse, camera);
                // Draw temp line on the Z-plane of the source node
                const tempPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -connectingNode.position.z);
                const targetPoint = new THREE.Vector3();
                raycaster.ray.intersectPlane(tempPlane, targetPoint);
                if(targetPoint) updateTempLine(targetPoint);
            }
        });

        window.addEventListener('mouseup', () => {
            if (draggedNode) {
                draggedNode = null;
                controls.enabled = true; // Re-enable camera
            }
            if (connectingNode) {
                connectingNode = null;
                if(tempLineMesh) {
                    scene.remove(tempLineMesh);
                    tempLineMesh = null;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            webglRenderer.setSize(window.innerWidth, window.innerHeight);
            cssRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 6. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Smooth Camera Transitions
            camera.position.lerp(targetCameraPos, 0.04);
            controls.target.lerp(targetCameraLook, 0.04);
            controls.update(); // Required for damping

            // Billboard Logic: Ensure DOM text is always readable
            nodes.forEach(node => {
                if (viewState === 0) {
                    // Lock flat to Z plane for Top-Down
                    node.rotation.set(0, 0, 0);
                } else {
                    // Auto-rotate to face camera in Side and 3D views
                    node.lookAt(camera.position);
                }
            });

            webglRenderer.render(scene, camera);
            cssRenderer.render(scene, camera);
        }

        // Boot
        animate();
        
        // Initialize Supabase Client
        const SUPABASE_URL = "http://76.13.106.127:8100";
